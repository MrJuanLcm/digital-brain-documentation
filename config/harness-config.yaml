# ============================================================
# ⚙️ Harness Configuration — Digital Brain
# ============================================================
# Este archivo configura el Harness que orquesta la
# comunicación entre Claude CLI y Obsidian vía MCP.
# ============================================================

# ─── Vault de Obsidian ──────────────────────────────────
# Ruta absoluta a tu vault de Obsidian
vault_path: "/Users/tu-usuario/DigitalBrain"

# ─── MCP Server ─────────────────────────────────────────
# Qué servidor MCP usar para conectar con Obsidian.
# Recomendado: el servidor local incluido en este repo (config/mcp-server.js),
# que es el que documentan las guías. Como alternativa puedes usar un paquete
# publicado en npm, p. ej. "obsidian-mcp" o "obsidian-mcp-server".
# Opciones:
#   - "node config/mcp-server.js"  (servidor local, recomendado)
#   - "npx obsidian-mcp"           (paquete npm publicado)
mcp_server: "node config/mcp-server.js"

# ─── Claude ─────────────────────────────────────────────
# Modelo de Claude a utilizar. Consulta los IDs vigentes en
# https://docs.anthropic.com/en/docs/about-claude/models
claude_model: "claude-sonnet-4-20250514"

# Prompt de sistema que carga Claude al iniciar
system_prompt: |
  Eres un asistente de gestión de conocimiento personal.
  Tienes acceso completo al vault de Obsidian del usuario.
  Tu misión es ayudarle a procesar, organizar y conectar
  su conocimiento de forma activa.

# ─── Comportamiento ─────────────────────────────────────
auto_start: true                # Iniciar MCP server automáticamente
debug: false                    # Modo debug (logs detallados)

# ─── Backup ─────────────────────────────────────────────
backup:
  enabled: true
  interval_hours: 24            # Backup automático cada 24h
  max_backups: 30               # Mantener últimos 30 backups
  directory: "~/backups/digital-brain"

# ─── Vault ──────────────────────────────────────────────
vault:
  inbox_folder: "Inbox"         # Carpeta para información nueva
  daily_notes_folder: "Diario"  # Carpeta para notas diarias
  projects_folder: "Proyectos"  # Carpeta para proyectos
  references_folder: "Referencias"  # Carpeta para conocimiento permanente
  mocs_folder: "MOCs"          # Carpeta para Mapas de Contenido

  # Tags automáticos sugeridos al procesar entrada
  auto_tags:
    - "procesado"
    - "digital-brain"

# ─── Variables de entorno (sobrescriben este archivo) ────
# Puedes definir estas variables en lugar de editar este archivo:
#
# DIGITAL_BRAIN_VAULT_PATH        → vault_path
# DIGITAL_BRAIN_MCP_SERVER        → mcp_server
# DIGITAL_BRAIN_CLAUDE_MODEL      → claude_model
# DIGITAL_BRAIN_AUTO_START        → auto_start (true/false)
# DIGITAL_BRAIN_DEBUG             → debug (true/false)
# DIGITAL_BRAIN_BACKUP_ENABLED    → backup.enabled
# DIGITAL_BRAIN_BACKUP_INTERVAL   → backup.interval_hours
# DIGITAL_BRAIN_BACKUP_DIR        → backup.directory
# DIGITAL_BRAIN_INBOX_FOLDER      → vault.inbox_folder
# DIGITAL_BRAIN_DAILY_FOLDER      → vault.daily_notes_folder
# DIGITAL_BRAIN_PROJECTS_FOLDER   → vault.projects_folder
# DIGITAL_BRAIN_REFERENCES_FOLDER → vault.references_folder
# DIGITAL_BRAIN_MOCS_FOLDER       → vault.mocs_folder
#
# Ejemplo en ~/.zshrc o ~/.bashrc:
# export DIGITAL_BRAIN_VAULT_PATH="/mnt/c/Users/Yo/Documents/MiVault"
# export DIGITAL_BRAIN_MCP_SERVER="node config/mcp-server.js"
# export DIGITAL_BRAIN_CLAUDE_MODEL="claude-sonnet-4-20250514"
# export DIGITAL_BRAIN_DEBUG="true"
